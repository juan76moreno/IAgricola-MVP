<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IA grícola MVP v0.2</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f1412;font-family:Arial,sans-serif;color:#071827}
.app{max-width:430px;margin:auto;min-height:100vh;background:#f6f8f7;padding:24px 20px 92px}
.logo{font-size:27px;font-weight:900}.logo span{color:#18a84f}
.top{display:flex;justify-content:space-between;align-items:center}
.icon{background:white;border-radius:16px;padding:12px;box-shadow:0 4px 14px #0001}
h1{font-size:34px;margin:26px 0 6px}.sub{color:#667085;font-size:17px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}
.box{background:white;border-radius:18px;padding:13px 8px;text-align:center;box-shadow:0 5px 18px #0001}
.box b{display:block;font-size:24px}.box small{color:#667085;font-weight:700}
.card{background:white;border-radius:28px;padding:16px;box-shadow:0 10px 28px #0002;margin-top:18px}
.card img{width:100%;height:165px;object-fit:cover;border-radius:22px}
.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.muted{color:#667085}
.pill{padding:7px 10px;border-radius:10px;font-size:12px;font-weight:900}
.orange{background:#fff0d6;color:#9b5a00}.green{background:#e4f7eb;color:#11823d}.blue{background:#e5f0ff;color:#1666c1}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:16px 0}
.metric{background:#f7faf8;border-radius:16px;padding:12px 6px;text-align:center}
.metric b{display:block;font-size:16px}
.progress{height:9px;background:#e5ece8;border-radius:99px;overflow:hidden}.progress i{display:block;width:85%;height:100%;background:#18a84f}
.status{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.item{background:#f7faf8;border-radius:16px;padding:13px}.item b{display:block;font-size:20px}
button{border:0;border-radius:18px;background:#18a84f;color:white;font-size:17px;font-weight:900;padding:16px 18px;width:100%;margin-top:18px}
.prep{display:none;text-align:center}.circle{width:138px;height:138px;margin:24px auto;border:12px solid #d8f2e1;border-top-color:#18a84f;border-radius:50%;display:grid;place-items:center;font-size:34px;font-weight:900}
.task{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #eef1f2}
.alert{background:#fff4ed;border-radius:16px;padding:14px;margin:10px 0}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;height:78px;background:white;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #e6ece9}
.nav span{font-size:13px;color:#526073;font-weight:800}.plus{background:#18a84f;color:white;border-radius:50%;width:58px;height:58px;display:grid;place-items:center;font-size:30px;margin-top:-22px}
.header-title{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-top:24px;
  margin-bottom:20px;
}

.header-title h1{
  margin:0;
}

.status-chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:30px;
  background:#eaf8ef;
  color:#11823d;
  font-weight:700;
  font-size:14px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#18a84f;
  box-shadow:0 0 10px #18a84f;
}
</style>
</head>
<body>
<main class="app">
<section id="agenda">
  <div class="top">
    <div class="logo"><span>IA</span>grícola</div>
    <div><span class="icon">🔍</span> <span class="icon">🔔</span></div>
  </div>


  <div class="header-title">

    <div>

    <h1>Agenda Inteligente</h1>
    <p class="subtitle">Tu jornada comienza aquí.</p>
    </div>
  <div class="status-chip">

    <div class="status-dot"></div>

    IA Lista
  </div>

</div>
