<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IA grícola MVP v0.2</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f1412;font-family:Arial,sans-serif;color:#071827}
.app{max-width:430px;margin:auto;min-height:100vh;background:#f6f8f7;padding:24px 20px 92px}
.logo{font-size:27px;font-weight:900}.logo span{color:#18a84f}
.top{display:flex;justify-content:space-between;align-items:center}
.icon{background:white;border-radius:16px;padding:12px;box-shadow:0 4px 14px #0001}
h1{font-size:34px;margin:26px 0 6px}.sub{color:#667085;font-size:17px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}
.box{background:white;border-radius:18px;padding:13px 8px;text-align:center;box-shadow:0 5px 18px #0001}
.box b{display:block;font-size:24px}.box small{color:#667085;font-weight:700}
.card{
    background:white;
    border-radius:24px;
    padding:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.10);
    margin-top:10px;
}

.header-title h1{
  margin:0;
}

.status-chip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:30px;
  background:#eaf8ef;
  color:#11823d;
  font-weight:700;
  font-size:14px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#18a84f;
  box-shadow:0 0 10px #18a84f;
}
</style>
</head>
<body>
<main class="app">
<section id="agenda">
  <div class="top">
    <div class="logo"><span>IA</span>grícola</div>
    <div><span class="icon">🔍</span> <span class="icon">🔔</span></div>
  </div>


  <div class="header-title">

    <div>

    <h1>Agenda Inteligente</h1>
    <p class="subtitle">Tu jornada comienza aquí.</p>
    </div>
  <div class="status-chip">

    <div class="status-dot"></div>

    IA Lista
  </div>

</div>
